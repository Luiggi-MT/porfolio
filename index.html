<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuiggiMT - Enlaces de luiggi y curso</title>
    <link rel="stylesheet" href="./assets/output.css">
</head>
<body class="max-w-xl mx-auto  min-h-dvh bg-gradient-to-b from-black via-sky-950 to-gray-800">
    <header class="text-white justify-center flex flex-col items-center">
        <img alt="foto de Luiggi.MT" src="./assets/portada.jpeg"
        class="h-96 object-cover mask-b-from-40% mask-b-to-100% mask-radial-at-center mask-radial-from-50% mask-radial-to-73%"
        />
        <section class="flex flex-col justify-center items-center
                        mb-8 -mt-4
                        ">
            <span class="text-sky-400 text-xl font-mono px-3 py-1 
                        border border-black/45 rounded-full 
                        shadow-sm 
                        flex items-center justify-center 
                        bg-black/45
                        z-10
                        ">@LuiggiMT</span>
            <h1 class="text-3xl font-bold leading-tight mt-1">Luis Alberto Mejía Troya</h1>
        </section>
        <section class="flex gap-2 justify-center mt-4">
            <a class="bg-slate-600 social-button" href="https://github.com/Luiggi-MT" aria-label="GitHub" title="Ir al GitHub de Luiggi.MT">
                <svg width="28" height="28">
                    <use xlink:href="./assets/sprite.svg#github"/>
                </svg>
            </a>
        
            <a class="bg-gradient-to-tr from-yellow-300 via-pink-600 to-purple-600 social-button" href="https://www.instagram.com/luiggi.mt/" aria-label="Instagram" title="Ir al Instagram de Luiggi.MT">
                <svg width="28" height="28">
                <use xlink:href="./assets/sprite.svg#instagram"/>
            </svg>
            </a> 
            <a class="bg-white social-button" href="https://apprendo.es/" aria-label="Apprendo" title="Ir a la página de Apprendo">
                <img src="./assets/apprendo.png" height="40" width="40" />
            </a>
        </section>
        <p class="text-center mt-4 text-sm text-[#a8cae1] text-balance">Ingeniero de software y autor de la aplicación Apprendo, orientada al seguimiento de tareas para colegios y personas con discapacidad cognitiva.</p>
        
    </header>
    <main class="pt-4 text-white mt-5 text-5xl">
        <p>Tecnologías más usadas</p>
        <section class="text-sm
                        grid grid-cols-3 grid-rows-2 gap-2 w-full mt-10">
            <article class="relative rounded-3xl overflow-hidden
                            bg-gradient-to-br from-cyan-900 via-cyan-700 to-cyan-500
                            h-32 p-4 
                            flex flex-col items-start
                            hover:scale-105 hover:contrast-125
                            transition
                            border border-cyan-900/50
                            col-span-2
                            group">
            <span class="absolute bottom-2 left-4 font-bold text-2xl">React Native</span>
            <svg width="100" height="100" 
                class="absolute -right-2 -bottom-4 -rotate-6 size-28
                       group-hover:animate-spin-slow
                       transition-transform">
                <use xlink:href="./assets/sprite.svg#react"/>
            </svg>
            </article>
            <article class="relative rounded-3xl overflow-hidden
                            bg-gradient-to-br from-lime-900 via-green-700 to-emerald-500
                            h-32 p-4 
                            flex flex-col items-start
                            hover:scale-105 hover:contrast-125
                            transition
                            border border-lime-900/50
                            col-span-1
                            group">
            <span class="absolute bottom-2 left-4 font-bold text-2xl">Node.js</span>
            <svg width="100" height="100" 
                class="absolute -right-2 -bottom-4 -rotate-6 size-28
                       group-hover:animate-spin-slow
                       transition-transform">
                <use xlink:href="./assets/sprite.svg#node"/>
            </svg>
            </article>
            <article class="relative rounded-3xl overflow-hidden
                            bg-gradient-to-br from-[#E44D26] via-[#F16529] to-white
                            h-32 p-4 
                            flex flex-col items-start
                            hover:scale-105 hover:contrast-125
                            transition
                            border border-[#C13B1B]/50
                            col-span-1
                            group">
            <span class="absolute bottom-2 left-4 font-bold text-2xl">HTML</span>
            <svg width="100" height="100" 
                class="absolute -right-2 -bottom-4 -rotate-6 size-28
                       
                       transition-transform">
                <use xlink:href="./assets/sprite.svg#html"/>
            </svg>
            </article>
            <article class="relative rounded-3xl overflow-hidden
                            bg-gradient-to-br from-[#663399] via-[#8A2BE2] to-white
                            h-32 p-4 
                            flex flex-col items-start
                            hover:scale-105 hover:contrast-125
                            transition
                            border border-[#663399]/50
                            col-span-2
                            group">
            <span class="absolute bottom-2 left-4 font-bold text-2xl">CSS</span>
            <svg width="100" height="100" 
                class="absolute -right-2 -bottom-4 -rotate-6 size-28
                       
                       transition-transform">
                <use xlink:href="./assets/sprite.svg#css"/>
            </svg>
            </article>
        </section>


    </main>
        
    <footer class="text-center mt-8 text-sm text-[#a8cae1]">
       
    </footer>
</body>
</html>
